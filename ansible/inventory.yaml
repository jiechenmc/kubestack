k3s_cluster:
  children:
    server:
      hosts:
        10.144.138.247:
        k3s-node-1:
          ansible_host: 10.144.138.246
        k3s-node-2:
          ansible_host: 10.144.138.248
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "/home/chenj7728/.ansible/bin/python"
    agent:
      hosts: {}

  vars:
    ansible_port: 22
    k3s_version: v1.33.3+k3s1
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"

    # Optional vars
    extra_server_args: |
      --tls-san {{ api_endpoint }} --disable-network-policy --disable-helm-controller --disable=servicelb --write-kubeconfig-mode=644 --selinux --flannel-backend=none --cluster-cidr=10.43.0.0/16 --disable=traefik

    # extra_agent_args: ""
    # cluster_context: k3s-ansible
    # extra_service_envs: ["ENV_VAR1=VALUE1", "ENV_VAR2=VALUE2"]
    user_kubectl: true

    # registries_config_yaml:  |
    #   Containerd can be configured to connect to private registries and use them to pull images as needed by the kubelet.
    #   YAML here will be placed as the content of /etc/rancher/k3s/registries.yaml
    #   See https://docs.k3s.io/installation/private-registry
