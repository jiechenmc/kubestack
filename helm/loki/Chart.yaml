apiVersion: v2
appVersion: 3.6.7
dependencies:
- alias: minio
  condition: minio.enabled
  name: minio
  repository: https://charts.min.io/
  version: 5.4.0
- alias: grafana-agent-operator
  condition: monitoring.selfMonitoring.grafanaAgent.installOperator
  name: grafana-agent-operator
  repository: https://grafana.github.io/helm-charts
  version: 0.5.2
- alias: rollout_operator
  condition: rollout_operator.enabled
  name: rollout-operator
  repository: https://grafana.github.io/helm-charts
  version: 0.45.0
description: Helm chart for Grafana Loki supporting monolithic, simple scalable, and
  microservices modes.
home: https://grafana-community.github.io/helm-charts
icon: https://grafana.com/docs/loki/latest/logo_and_name.png
maintainers:
- email: mike1118@live.com
  name: Michael Timmerman
  url: https://github.com/TheRealNoob
- email: github@jkroepke.de
  name: Jan-Otto Kröpke
  url: https://github.com/jkroepke
- email: quentin.bisson@gmail.com
  name: Quentin Bisson
  url: https://github.com/QuentinBisson
name: loki
sources:
- https://github.com/grafana/loki
- https://grafana.com/oss/loki/
- https://grafana.com/docs/loki/latest/
type: application
version: 6.57.0
