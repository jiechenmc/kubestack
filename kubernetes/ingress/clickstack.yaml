apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clickstack
spec:
  ingressClassName: traefik
  rules:
    - host: clickstack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clickstack-app
                port:
                  number: 3000
